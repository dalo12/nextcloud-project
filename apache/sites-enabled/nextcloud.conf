# Redirect all HTTP traffic to HTTPS
<VirtualHost *:80>
    ServerName localhost
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName localhost
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/nextcloud.dalotech.cert
    SSLCertificateKeyFile /etc/ssl/private/nextcloud.dalotech.key

    <Directory /var/www/html/>
        Options +FollowSymlinks
        AllowOverride All
        Require all granted

        <IfModule mod_dav.c>
            Dav off
        </IfModule>

        SetEnv HOME /var/www/html
        SetEnv HTTP_HOME /var/www/html
    </Directory>

    # Forward PHP requests to the Nextcloud FPM container
    <FilesMatch "\.php$">
        SetHandler "proxy:fcgi://nextcloud:9000"
    </FilesMatch>

    DirectoryIndex index.php index.html
</VirtualHost>
